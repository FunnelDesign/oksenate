services:
  custom_module.event_subscriber:
    class: Drupal\custom_module\EventSubscriber\RedirectAnonymousSubscriber
    arguments: []
    tags:
      - {name: event_subscriber}
  custom_module.route_subscriber:
    class: Drupal\custom_module\Routing\ManageCustomRoutes
    tags:
      - { name: event_subscriber }

  custom_module.node_author:
    class: Drupal\custom_module\Plugin\views\CustomNidToAuthor
    tags:
      - { name: node_author }
