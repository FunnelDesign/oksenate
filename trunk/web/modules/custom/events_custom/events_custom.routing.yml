
events_custom.events_insert:
  path: '/events-custom/insert'
  defaults:
    _controller: '\Drupal\events_custom\Controller\EventsController::insertEvents'
    _title: 'load'
  requirements:
    _permission: 'access content'
events_custom.events_home_insert:
  path: '/events-custom/insert-home'
  defaults:
    _controller: '\Drupal\events_custom\Controller\EventsController::insertHomeEvents'
    _title: 'load'
  requirements:
    _permission: 'access content'
events_custom.settings_form:
  path: '/admin/config/events_custom/settings'
  defaults:
    _form: '\Drupal\events_custom\Form\EventsCustomForm'
    _title: 'Events Custom Cron Settings'
  requirements:
    _permission: 'access administration pages'
